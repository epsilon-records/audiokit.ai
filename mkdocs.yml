site_name: AudioKit AI Platform
site_url: https://docs.audiokit.ai
site_description: Documentation for the AudioKit AI Platform
site_author: AudioKit Team
repo_url: https://github.com/audiokit/audiokit
repo_name: audiokit/audiokit
edit_uri: edit/main/docs/

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - search.highlight
    - search.share
    - search.suggest
    - content.code.copy
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Roboto
    code: Roboto Mono
  icon:
    repo: fontawesome/brands/github
  logo: assets/logo.svg
  favicon: assets/favicon.ico

plugins:
  - search
  - minify:
      minify_html: true
      minify_js: true
      minify_css: true
  - git-revision-date-localized:
      type: date
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          options:
            show_source: true
            show_root_heading: true
            show_category_heading: true
            show_if_no_docstring: true
  - versioning:
      version_selector_type: dropdown
  - redirects:
      redirect_maps:
        'changelog.md': 'https://github.com/audiokit/audiokit/blob/main/CHANGELOG.txt'

markdown_extensions:
  - admonition
  - attr_list
  - codehilite
  - def_list
  - footnotes
  - meta
  - toc:
      permalink: true
      toc_depth: 3
  - pymdownx.arithmatex
  - pymdownx.betterem
  - pymdownx.caret
  - pymdownx.critic
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:materialx.emoji.twemoji
      emoji_generator: !!python/name:materialx.emoji.to_svg
  - pymdownx.highlight:
      use_pygments: true
      linenums: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

extra:
  version:
    provider: mike
  analytics:
    provider: google
    property: !ENV GOOGLE_ANALYTICS_KEY
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/audiokit/audiokit
    - icon: fontawesome/brands/discord
      link: https://discord.gg/audiokit
    - icon: fontawesome/brands/twitter
      link: https://twitter.com/AudioKitPro

nav:
  - Home: index.md
  - Getting Started:
    - Quick Start: getting-started/quickstart.md
    - Installation: getting-started/installation.md
    - First Steps: getting-started/first-steps.md
    - Configuration: getting-started/configuration.md
  - User Guide:
    - Overview: user-guide/overview.md
    - Core Features: user-guide/features.md
    - Tutorials: user-guide/tutorials.md
    - Best Practices: user-guide/best-practices.md
    - FAQ: user-guide/faq.md
  - API Reference:
    - Overview: api/overview.md
    - Authentication: api/authentication.md
    - Knowledge Base: api/knowledge-base.md
    - Platform Integration: api/platform-integration.md
    - Analytics: api/analytics.md
    - Error Handling: api/error-handling.md
    - Rate Limiting: api/rate-limiting.md
    - Versioning: api/versioning.md
  - Examples:
    - Python: examples/python.md
    - TypeScript: examples/typescript.md
    - cURL: examples/curl.md
    - Postman: examples/postman.md
  - Technical Docs:
    - Architecture: technical/architecture.md
    - Deployment: technical/deployment.md
    - Configuration: technical/configuration.md
    - Performance: technical/performance.md
    - Security: technical/security.md
    - Monitoring: technical/monitoring.md
  - Contributing:
    - Guidelines: contributing/guidelines.md
    - Development Setup: contributing/development.md
    - Code Style: contributing/code-style.md
    - Testing: contributing/testing.md
    - Documentation: contributing/documentation.md
  - Support:
    - Troubleshooting: support/troubleshooting.md
    - Known Issues: support/known-issues.md
    - Support Channels: support/channels.md
  - About:
    - Changelog: changelog.md
    - License: about/license.md
    - Team: about/team.md 