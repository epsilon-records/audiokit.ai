name: Documentation

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - '.github/workflows/docs.yml'
  pull_request:
    branches: [main]
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - '.github/workflows/docs.yml'
  release:
    types: [published]

jobs:
  docs:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r docs/requirements.txt
      
      - name: Set up Git user
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
      
      - name: Run documentation tests
        run: python docs/testing/run_doc_tests.py
      
      - name: Check links
        uses: gaurav-nelson/github-action-markdown-link-check@v1
        with:
          use-quiet-mode: 'yes'
          use-verbose-mode: 'no'
          config-file: '.github/workflows/mlc_config.json'
          folder-path: 'docs'
      
      - name: Build documentation
        run: python docs/build.py
      
      - name: Deploy documentation (PR)
        if: github.event_name == 'pull_request'
        run: |
          VERSION="pr-${{ github.event.pull_request.number }}"
          python docs/build.py --deploy --version $VERSION
      
      - name: Deploy documentation (Main)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          VERSION="latest"
          python docs/build.py --deploy --version $VERSION
      
      - name: Deploy documentation (Release)
        if: github.event_name == 'release'
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          python docs/build.py --deploy --version $VERSION
          python docs/build.py --deploy --version latest
      
      - name: Upload documentation artifact
        uses: actions/upload-artifact@v3
        with:
          name: documentation
          path: site/
      
      - name: Deploy to GitHub Pages
        if: github.event_name != 'pull_request'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          force_orphan: true
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: 'docs: update documentation' 