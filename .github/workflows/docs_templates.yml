name: Documentation Templates

on:
  workflow_dispatch:  # Manual trigger
  schedule:
    - cron: '0 0 * * 0'  # Weekly on Sunday
  push:
    branches: [main]
    paths:
      - 'docs/templates/**'
      - 'context/.templates/**'
      - 'src/**'
      - '.github/workflows/docs_templates.yml'

jobs:
  validate_templates:
    name: Validate Templates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          
      - name: Validate documentation templates
        run: python3 scripts/validate_doc_templates.py
        
      - name: Validate context templates
        run: python3 scripts/validate_context_templates.py

  regenerate_docs:
    name: Regenerate Documentation
    needs: validate_templates
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install openai python-dotenv pyyaml
      
      - name: Regenerate Documentation
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python3 scripts/generate_docs.py
      
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "docs: update from templates"
          title: "📚 Update Documentation from Templates"
          body: |
            This PR was automatically created to update documentation from templates.
            
            Changes:
            - Updated README.md and DEVELOPER.md using LLM
            - Synchronized documentation templates
            - Generated example documentation
            
            Please review the changes and merge if appropriate.
          branch: update-docs-from-templates
          base: main
          labels: |
            documentation
            templates
            automated-pr
          delete-branch: true
        
  sync_templates:
    name: Sync Templates
    needs: validate_templates
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          
      - name: Sync documentation templates
        run: python3 scripts/sync_doc_templates.py
        
      - name: Sync context templates
        run: python3 scripts/sync_context_templates.py
        
  generate_examples:
    name: Generate Examples
    needs: validate_templates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          
      - name: Generate example documentation
        run: python3 scripts/generate_doc_examples.py
        
      - name: Generate example context files
        run: python3 scripts/generate_context_examples.py
        
      - name: Upload examples artifact
        uses: actions/upload-artifact@v4
        with:
          name: documentation-examples
          path: |
            docs/examples/
            context/examples/
          retention-days: 30
          
  notify:
    name: Notify on Failure
    needs: [validate_templates, regenerate_docs, sync_templates, generate_examples]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Send notification
        uses: actions/github-script@v7
        with:
          script: |
            const { repo, owner } = context.repo;
            const run_id = context.runId;
            
            const message = `Documentation templates workflow failed!
            
            Workflow: [View Run](https://github.com/${owner}/${repo}/actions/runs/${run_id})
            
            Please check the workflow logs for details.`;
            
            await github.rest.issues.create({
              owner,
              repo,
              title: '📋 Documentation Templates Failed',
              body: message,
              labels: ['documentation', 'templates', 'failed']
            }); 