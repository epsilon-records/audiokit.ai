name: Copyright Check

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 0 1 1 *'  # Run yearly to catch year transitions

jobs:
  check-copyright:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.8'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install ruff mypy

    - name: Check copyright headers
      run: |
        python scripts/update_copyright.py --check
        
    - name: Report findings
      if: failure()
      run: |
        echo "::error::Found copyright issues. Please run 'python scripts/update_copyright.py' to fix."
        echo "Issues may include:"
        echo "- Missing copyright headers"
        echo "- Outdated copyright years"
        echo "- Incorrect license types"
        exit 1 