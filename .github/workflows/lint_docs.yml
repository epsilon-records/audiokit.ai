name: Lint Documentation

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - '.github/workflows/lint_docs.yml'
      - 'context/**'
  pull_request:
    branches: [main]
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - '.github/workflows/lint_docs.yml'
      - 'context/**'
  workflow_dispatch:

jobs:
  lint_markdown:
    name: Lint Markdown
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: markdownlint-cli
        uses: nosborn/github-action-markdown-cli@v3.3.0
        with:
          files: ./docs ./context
          config_file: .markdownlint.json
          
      - name: Check Markdown links
        uses: gaurav-nelson/github-action-markdown-link-check@v1
        with:
          use-quiet-mode: 'yes'
          use-verbose-mode: 'no'
          config-file: '.github/workflows/mlc_config.json'
          folder-path: 'docs,context'
          
  lint_context:
    name: Lint Context Files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          
      - name: Validate context files
        run: python3 scripts/validate_content_quality.py
        
      - name: Check context structure
        run: python3 scripts/validate_context_structure.py
        
  lint_yaml:
    name: Lint YAML
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          
      - name: Install yamllint
        run: pip install yamllint
        
      - name: Lint YAML files
        run: yamllint -c .yamllint.yml .
        
  lint_spelling:
    name: Check Spelling
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install cspell
        run: npm install -g cspell
        
      - name: Check spelling
        run: |
          cspell "docs/**/*.md" "context/**/*.md" --config .cspell.json
          
  notify:
    name: Notify on Failure
    needs: [lint_markdown, lint_context, lint_yaml, lint_spelling]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Send notification
        uses: actions/github-script@v7
        with:
          script: |
            const { repo, owner } = context.repo;
            const run_id = context.runId;
            
            const message = `Documentation linting failed!
            
            Workflow: [View Run](https://github.com/${owner}/${repo}/actions/runs/${run_id})
            
            Please check the workflow logs for details.`;
            
            await github.rest.issues.create({
              owner,
              repo,
              title: '📝 Documentation Linting Failed',
              body: message,
              labels: ['documentation', 'linting-failed']
            }); 