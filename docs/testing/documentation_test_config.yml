# Documentation Testing Configuration

# Markdown Linting Rules
markdown:
  line_length: 100
  no_trailing_spaces: true
  no_trailing_punctuation: true
  no_multiple_blanks: true
  proper_header_increment: true
  first_header_h1: true
  no_duplicate_header: true
  single_h1: true
  no_empty_links: true
  no_bare_urls: true
  fenced_code_blocks: true
  code_block_style:
    style: fenced
    required_language: true

# Link Validation
links:
  check_external: true
  ignore_patterns:
    - "localhost"
    - "127.0.0.1"
    - "example.com"
  retry_count: 3
  timeout_seconds: 10
  parallel_requests: 5

# Code Example Testing
code_examples:
  python:
    enabled: true
    test_runner: pytest
    requirements_file: requirements-test.txt
    ignore_patterns:
      - "**/examples/snippets/*.py"
  typescript:
    enabled: true
    test_runner: jest
    tsconfig: tsconfig.test.json
    ignore_patterns:
      - "**/examples/snippets/*.ts"

# Documentation Coverage
coverage:
  minimum_coverage: 90
  check_docstrings: true
  check_type_hints: true
  check_examples: true
  ignore_private: true
  ignore_patterns:
    - "**/tests/**"
    - "**/examples/**"

# API Documentation
api_docs:
  validate_openapi: true
  check_examples: true
  required_sections:
    - description
    - parameters
    - responses
    - examples
  response_formats:
    - json
    - xml

# Comment Style
comments:
  python:
    style: google
    required_sections:
      - Args
      - Returns
      - Raises
  typescript:
    style: jsdoc
    required_tags:
      - param
      - returns
      - throws

# File Organization
organization:
  required_files:
    - README.md
    - CONTRIBUTING.md
    - CHANGELOG.txt
    - LICENSE
  required_sections:
    readme:
      - Overview
      - Installation
      - Usage
      - Documentation
      - Contributing
    api_docs:
      - Authentication
      - Endpoints
      - Models
      - Examples

# Output Configuration
output:
  format: junit
  report_file: doc-test-results.xml
  verbose: true
  fail_on_warning: false
  summary_only: false 