[tool.poetry]
name = "audiokit-mcp-server"
version = "3.0.0"
description = "AudioKit MCP Server - FastAPI implementation with MCP SDK integration"
authors = ["Nathaniel Houk <nate@audiokit.io>"]

[tool.poetry.dependencies]
python = ">=3.10,<3.11"
fastapi = "^0.115.8"
uvicorn = "^0.34.0"
pydantic = "^2.10.6"
pydantic-settings = "^2.7.1"
mcp = "1.2.1"
llama-index = "^0.12.17"
llama-index-core = "^0.12.17"
llama-index-vector-stores-pinecone = "^0.4.4"
structlog = "^25.1.0"
llama-index-embeddings-huggingface = "^0.5.1"
tensorflow = "^2.18.0"
tf-keras = "^2.18.0"
llama-index-llms-openrouter = "^0.3.1"
pinecone = ">=5.0.0,<6.0.0"
pyacoustid = "^1.3.0"
pydub = "^0.25.1"
python-multipart = "^0.0.20"
neo4j = "^5.28.1"

[tool.poetry.group.dev.dependencies]
pytest = "^8.0.0"
black = "^24.1.0"
isort = "^5.13.0"
mypy = "^1.8.0"
pytest-asyncio = "^0.25.3"
pytest-mock = "^3.14.0"
httpx = "^0.28.1"

[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"

[tool.black]
line-length = 88
target-version = ['py310']

[tool.isort]
profile = "black"
multi_line_output = 3 

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."] 
asyncio_mode = "auto" 


[project.optional-dependencies]
test = [
    "pytest>=8.0.0",
    "pytest-asyncio>=0.25.3",
    "pytest-mock>=3.14.0",
    "httpx>=0.28.1"
]
