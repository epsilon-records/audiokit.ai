[project]
name = "audiokit"
version = "1.0.0"
description = "Open-source SDK for music platform integrations"
authors = [
    {name = "AudioKit Team", email = "team@audiokit.org"},
]
dependencies = [
    "httpx>=0.24.0",
    "pydantic>=2.0.0",
    "redis>=5.0.0",
    "typing-extensions>=4.0.0",
]
requires-python = ">=3.11"
readme = "README.md"
license = {text = "MIT"}

[build-system]
requires = ["pdm-backend"]
build-backend = "pdm.backend"

[tool.pdm.dev-dependencies]
test = [
    "pytest>=7.0.0",
    "pytest-asyncio>=0.21.0",
    "pytest-cov>=4.1.0",
]
lint = [
    "ruff>=0.1.0",
    "black>=23.0.0",
    "mypy>=1.0.0",
] 