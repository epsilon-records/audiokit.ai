[tool.poetry]
name = "audiokit-ai"
version = "0.1.0"
description = "AI-powered audio processing service"
authors = ["Your Name <your.email@example.com>"]

[tool.poetry.dependencies]
python = "^3.8"
fastapi = "^0.104.0"
uvicorn = "^0.23.0"
librosa = "0.10.0"
numpy = "^1.24.0"
pydantic = "^2.6.0"
psutil = "^5.9.0"
pyyaml = "^6.0.2"
python-multipart = "^0.0.20"
soundfile = "^0.12.1"
redis = "^4.5.4"
audiokit-core = {path = "../audiokit-core", develop = true}
loguru = "^0.7.2"

[tool.poetry.group.dev.dependencies]
pytest = "^7.4.0"
pytest-asyncio = "^0.21.0"
pytest-cov = "^4.1.0"
ruff = "^0.1.0"
httpx = "^0.25.0"

[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"

[tool.ruff]
line-length = 88
target-version = "py311"

[tool.poetry.scripts]
audiokit-server = "audiokit_ai.server:start_server" 