[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "audiokit_ai"
version = "0.1.0"
description = "AudioKit-AI Server - AI-powered audio processing service"
readme = "README.md"
authors = [
    {name = "Your Name", email = "your.email@example.com"}
]
dependencies = [
    "fastapi>=0.78.0",
    "uvicorn>=0.18.0",
    "celery>=5.2.0",
    "redis>=4.0.0",
    "sqlalchemy>=1.4",
    "boto3>=1.20",
    "pyjwt>=2.3.0",
    "grpcio>=1.47.0",
    "grpcio-tools>=1.47.0",
    "fastapi-limiter>=0.1.0",
    "pytest>=7.0"
]

[project.urls]
Homepage = "https://example.com/audiokit_ai"

[tool.hatch.version]
path = "audiokit_ai/__init__.py" 