[tool.poetry]
name = "audiokit-ai"
version = "0.1.0"
description = "🤖 AudioKit AI: AI-powered audio processing backend service"
authors = ["Nathaniel Houk <nate@audiokit.ai>"]
license = "Confidential and Proprietary"

[tool.poetry.dependencies]
python = "^3.11"
fastapi = "^0.104.1"
uvicorn = "^0.24.0"
celery = "^5.2.7"
web3 = "^6.0.0"
magenta = "^2.1.4"
librosa = "0.10.0"
pydantic = "^2.6.0"
psutil = "^5.9.0"
pyyaml = "^6.0.2"
python-multipart = "^0.0.20"
soundfile = "^0.12.1"
redis = "^4.5.4"
audiokit-core = {path = "../audiokit-core", develop = true}
loguru = "^0.7.2"
typer = "^0.9.0"
rich = "^13.0.0"
python-dotenv = "^1.0.0"

[tool.poetry.group.dev.dependencies]
pytest = "^7.4.0"
pytest-asyncio = "^0.21.0"
pytest-cov = "^4.1.0"
ruff = "^0.1.0"
httpx = "^0.25.0"

[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"

[tool.ruff]
line-length = 88
target-version = "py311"

[tool.poetry.scripts]
audiokit-server = "audiokit_ai.server:start_server" 