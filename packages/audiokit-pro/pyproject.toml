[project]
name = "audiokit-pro"
version = "1.0.0"
description = "Professional AI-powered music marketing tools"
authors = [
    {name = "AudioKit Team", email = "team@audiokit.org"},
]
dependencies = [
    "audiokit>=1.0.0",
    "openai>=1.0.0",
    "anthropic>=0.5.0",
    "pinecone-client>=2.0.0",
    "llama-index>=0.8.0",
    "langchain>=0.1.0",
]
requires-python = ">=3.11"
readme = "README.md"
license = {text = "Proprietary"}

[build-system]
requires = ["pdm-backend"]
build-backend = "pdm.backend"

[tool.pdm.dev-dependencies]
test = [
    "pytest>=7.0.0",
    "pytest-asyncio>=0.21.0",
    "pytest-cov>=4.1.0",
]
lint = [
    "ruff>=0.1.0",
    "black>=23.0.0",
    "mypy>=1.0.0",
] 