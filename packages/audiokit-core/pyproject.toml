[tool.poetry]
name = "audiokit-core"
version = "0.1.0"
description = "🧩 AudioKit Core: Shared models and interfaces for the AudioKit ecosystem"
authors = ["Nathaniel Houk <nate@audiokit.ai>"]
license = "MIT"

[tool.poetry.dependencies]
python = "^3.11"
pydantic-settings = "^2.0.3"
