[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "audiokit_ai"
version = "0.1.0"
description = "AI-powered audio processing toolkit"
requires-python = ">=3.10"
dependencies = [
    "numpy",
    "loguru",
    "python-osc",
    "sounddevice",
    "JACK-client",
    "mido",
    "openai",
    "soundfile",
    "pytest>=8.3.4",
    "gunicorn",
    "uvicorn>=0.22.0",
    "fastapi>=0.115.8",
    "torch>=1.13.0",
    "torchaudio>=0.13.0",
    "demucs>=4.0.1",
    "openai-whisper>=20240930",
    "deepfilternet>=0.5.6",
    "deepfilterlib>=0.5.6",
    "faiss-cpu>=1.7.3",
    "openl3>=0.4.1",
    "pydantic-settings>=2.0.0",
    "fastapi-limiter>=0.1.6",
    "google-cloud-speech",
    "matchering",
    "llvmlite>=0.41.0",
    "exceptiongroup>=1.1.0",
    "treetable>=0.2.5",
    "python-multipart",
    "jose==v5.9.6",
]

[project.optional-dependencies]
test = [
    "pytest",
    "pytest-mock",
    "pytest-cov",
]

[tool.pytest.ini_options]
addopts = "-v"
testpaths = ["tests"]
python_files = "test_*.py"
markers = [
    "integration: marks tests as integration tests",
]

[tool.hatch.build.targets.wheel]
packages = ["audiokit_ai"]
