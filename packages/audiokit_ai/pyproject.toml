[build-system]
requires = ["hatchling>=1.27"]
build-backend = "hatchling.build"

[project]
name = "audiokit_ai"
dynamic = ["version"]
dependencies = [
    "torch==2.0.0",
    "torchaudio==2.0.0",
    "deepfilternet==0.5.6",
    "demucs==4.0",
    "openai-whisper==1.0.0",
    "fastapi==0.95.0",
    "uvicorn==0.21.0",
    "pytest==7.0.0",
    "httpx==0.23.0",
    "pytest-asyncio==0.20.0",
    "fastapi-limiter==0.1.5",
    "redis==4.5.5",
    "faiss-cpu==1.7.3",
    "openl3==0.4.2",
    "google-cloud-speech==2.16.0",
    "python-dotenv==1.0.0",
    "loguru>=0.7.0"
]

[project.optional-dependencies]
test = [
    "pytest",
    "pytest-cov",
    "pytest-asyncio",
    "httpx"
]

[tool.pytest.ini_options]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "function"
addopts = "-v --cov=audiokit_ai --cov-report=term-missing"
testpaths = ["tests"]

[tool.hatch.envs.test]
features = ["test"]
prefer-binary = true
parallel-install = true

[tool.hatch.version]
source = "regex"
path = "src/audiokit_ai/__init__.py"
pattern = "^\\s*__version__\\s*=\\s*[\"'](?P<version>[^\"']+)[\"']"

[tool.hatch.metadata]
allow-direct-references = true