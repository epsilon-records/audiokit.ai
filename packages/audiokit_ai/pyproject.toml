[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "audiokit_ai"
version = "0.1.0"
dynamic = ["version"]
dependencies = [
    "torch>=2.0.0",
    "torchaudio>=2.0.0",
    "deepfilternet>=0.5.6",
    "demucs>=4.0",
    "whisper>=1.0",
    "fastapi>=0.95.0",
    "uvicorn>=0.21.0",
    "pytest>=7.0.0",
    "httpx>=0.23.0",
    "pytest-asyncio>=0.20.0",
    "fastapi-limiter>=0.1.5",
    "redis>=4.5.5",
    "openai-whisper>=1.0.0",
    "demucs>=4.0",
    "deepfilternet>=0.5.6"
]

[project.optional-dependencies]
test = [
    "pytest",
    "pytest-cov",
    "pytest-asyncio",
    "httpx"
]
dev = [
    "mypy",
    "ruff"
]

[tool.hatch.envs.default]
dependencies = [
    "pytest",
    "pytest-cov",
    "pytest-asyncio",
    "httpx"
]

[tool.hatch.envs.test]
features = ["test"]
dependencies = [
    "pytest",
    "pytest-cov",
    "pytest-asyncio",
    "httpx"
]
prefer-binary = true
parallel-install = true

[tool.hatch.envs.dev]
features = ["dev"]
dependencies = [
    "mypy",
    "ruff"
]

[tool.pytest.ini_options]
asyncio_mode = "auto"
addopts = "-v --cov=audiokit_ai --cov-report=term-missing"
testpaths = ["tests"]

[tool.hatch.build.targets.wheel]
packages = ["audiokit_ai"]

[tool.ruff]
line-length = 88
select = [
    "E",  # Pycodestyle errors
    "F",  # Pyflakes
    "I",  # Isort
    "B",  # flake8-bugbear
    "C",  # flake8-comprehensions
    "W",  # Pycodestyle warnings
]
ignore = [
    "E203",  # Whitespace before ':'
]
format = [
    "I",  # Isort
    "W",  # Pycodestyle warnings
]

[tool.hatch.version]
source = "module"
path = "src/audiokit_ai/__init__.py"