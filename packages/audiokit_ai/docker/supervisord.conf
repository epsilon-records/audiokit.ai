[supervisord]
nodaemon=true
logfile=/dev/null
stdout_logfile=/dev/stdout
logfile_maxbytes=0
loglevel=info

[program:audiokit]
command=uvicorn audiokit_ai.main:app --host 0.0.0.0 --port 8000 --workers 2
user=appuser
directory=/app
autostart=true
autorestart=true
startretries=3
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
redirect_stderr=true
stdout_logfile_backups=0 