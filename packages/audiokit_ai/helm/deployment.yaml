apiVersion: apps/v1
kind: Deployment
metadata:
  name: audiokit-ai-deployment
spec:
  replicas: 3
  selector:
    matchLabels:
      app: audiokit-ai
  template:
    metadata:
      labels:
        app: audiokit-ai
    spec:
      containers:
      - name: audiokit-ai
        image: your_dockerhub_username/audiokit-ai:latest
        ports:
          - containerPort: 8000
        env:
          - name: REDIS_HOST
            value: "redis"
          - name: JWT_SECRET
            valueFrom:
              secretKeyRef:
                name: jwt-secret
                key: secret
---
# File: audiokit-ai/helm/service.yaml
apiVersion: v1
kind: Service
metadata:
  name: audiokit-ai-service
spec:
  selector:
    app: audiokit-ai
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8000
  type: LoadBalancer 