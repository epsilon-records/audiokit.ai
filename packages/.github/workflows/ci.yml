name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend-lint-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: audiokit-ai
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          pip install uv hatch
          uv install
      - name: Lint with Ruff
        run: |
          pip install ruff
          ruff .
      - name: Run tests
        run: |
          pip install pytest
          pytest

  sdk-lint-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: audiokit
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          pip install uv hatch
          uv install
      - name: Lint with Ruff
        run: |
          pip install ruff
          ruff .
      - name: Run tests
        run: |
          pip install pytest
          pytest 