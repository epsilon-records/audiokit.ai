[tool.poetry]
name = "audiokit"
version = "0.1.0"
description = "AudioKit AI Platform - Modern music distribution and artist management platform"
authors = ["Your Name <you@example.com>"]
license = "MIT"
readme = "README.md"
packages = [{include = "audiokit"}]

[tool.poetry.dependencies]
python = "^3.11"
fastapi = "^0.109.0"
uvicorn = "^0.27.0"
httpx = "^0.26.0"
pydantic = "^2.5.0"
sqlalchemy = "^2.0.0"
asyncpg = "^0.28.0"
redis = "^5.0.0"
celery = "^5.3.0"
transformers = "^4.35.0"
pinecone-client = "^3.0.0"
llama-index = "^0.9.0"
pandas = "^2.1.0"
matplotlib = "^3.8.0"
seaborn = "^0.13.0"
python-dotenv = "^1.0.0"
python-multipart = "^0.0.6"
python-jose = "^3.3.0"
passlib = "^1.7.4"

[tool.poetry.dev-dependencies]
pytest = "^7.4.0"
pytest-asyncio = "^0.23.0"
pytest-cov = "^4.1.0"
ruff = "^0.1.0"
mypy = "^1.6.0"
black = "^23.12.0"
isort = "^5.13.0"
httpx = {extras = ["cli"], version = "^0.26.0"}
types-python-dateutil = "^2.8.0"
types-redis = "^4.6.0"
types-requests = "^2.31.0"
types-pyyaml = "^6.0.0"

[tool.poetry.scripts]
audiokit = "audiokit.cli:main"

[tool.ruff]
line-length = 120
select = ["E", "F", "W", "I", "B", "C", "N", "D", "S", "T", "Q"]
ignore = ["E203", "E501", "W503"]
target-version = "py311"

[tool.ruff.mccabe]
max-complexity = 10

[tool.black]
line-length = 120
target-version = ["py311"]

[tool.isort]
profile = "black"
line_length = 120
known_first_party = ["audiokit"]

[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api" 