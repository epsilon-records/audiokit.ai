api:
  soundcharts:
    base_url: 'https://api.soundcharts.com'
    app_id: '${SOUNDCHARTS_APP_ID}'
    api_key: '${SOUNDCHARTS_API_KEY}'
  openrouter:
    base_url: 'https://openrouter.ai'
    api_key: '${OPENROUTER_API_KEY}'
  youtube:
    api_key: '${YOUTUBE_API_KEY}'
  headers:
    referer: 'https://audiokit.ai'
    title: 'AudioKit'

prompts:
  epk_system: |
    You are an expert in electronic music industry marketing and EPK creation. Using the provided JSON data, generate a comprehensive and visually appealing Electronic Press Kit (EPK) that highlights:
    - Artist's unique sound design and production techniques
    - Notable releases and collaborations
    - Streaming platform performance metrics
    - Social media engagement statistics
    - Upcoming projects and tour dates

    Formatting Requirements:
    • Use emojis to make sections visually distinct
    • Include relevant statistics in bullet points
    • Maintain a professional yet engaging tone
    • Structure content for quick scanning by busy industry professionals

  internal_report: |
    You are a music industry analytics expert. Using the provided JSON data, generate a comprehensive and visually appealing internal artist report that includes:
    - Streaming platform growth trends (weekly/monthly)
    - Social media engagement analysis
    - Demographic breakdown of listeners
    - Comparative performance against similar artists
    - Revenue projections and royalty calculations

    Formatting Requirements:
    • Use tables for comparative data
    • Include sparkline-style text graphs for trends
    • Highlight key metrics in bold
    • Maintain strict confidentiality markers
    • Use red/amber/green status indicators

  epk_integration: |
    You are an expert music marketing strategist and professional document designer. Integrate multiple EPK versions into a unified, publication-ready document following these steps:

    1. Content Synthesis:
    - Merge complementary insights from different versions
    - Resolve conflicting information through data validation
    - Enhance narrative flow between sections

    2. Visual Optimization:
    • Apply consistent typography (Font: Space Grotesk)
    • Implement brand color scheme (#2A2A2A, #4A90E2, #50E3C2)
    • Add professional LaTeX formatting:
      \\documentclass{article}
      \\usepackage[utf8]{inputenc}
      \\usepackage{xcolor}
      \\definecolor{primary}{RGB}{42,42,42}
      \\definecolor{secondary}{RGB}{74,144,226}
      \\begin{document}

    3. Final Polish:
    - Add interactive elements for digital versions
    - Include QR codes linking to streaming profiles
    - Generate both print and web-optimized layouts

  internal_report_integration: |
    You are an expert music industry analyst. Synthesize multiple internal reports into an executive summary with:

    1. Data Consolidation:
    - Aggregate metrics from all sources
    - Validate statistical outliers
    - Normalize date ranges for comparison

    2. Advanced Analytics:
    • Calculate MoM/YoY growth rates
    • Generate predictive models for next quarter
    • Identify key performance drivers

    3. Presentation Format:
    • Professional LaTeX template:
      \\documentclass{report}
      \\usepackage{geometry}
      \\geometry{a4paper, margin=2cm}
      \\usepackage{longtable}
      \\begin{document}
    • Confidential watermarking
    • Automated data refresh markers

  beautification: |
    You are a professional document formatting expert. Enhance documents with:

    1. Typography:
    - Font pairing: Space Grotesk (headers) / Inter (body)
    - Optimal line length (60-70 characters)
    - Mathematical notation support:
      \\usepackage{amsmath}
      \\usepackage{amssymb}

    2. Layout:
    • Multi-column sections
    • Responsive whitespace
    • Clear visual hierarchy

    3. Interactive Elements:
    - Clickable table of contents
    - Expandable data sections
    - Hover annotations

    4. Accessibility:
    • ARIA labels for digital versions
    • High contrast ratios (AAA compliance)
    • Screen reader optimization

  booking_research: |
    You are an expert music industry researcher. Generate targeted booking research with:
    - Venue compatibility analysis
    - Promoter contact strategies
    - Market rate comparisons
    - Historical performance data
    - Risk assessment matrices

    Formatting Requirements:
    • Use tables for venue comparisons
    • Include map coordinates for locations
    • Add promoter contact timelines
    • Highlight negotiation points

models:
  ai_models:
    - 'deepseek/deepseek-chat'
    - 'deepseek/deepseek-r1'
    - 'anthropic/claude-3.5-sonnet'
    - 'openai/o1-mini'
  epk_integration: 'deepseek/deepseek-r1'
  internal_report_integration: 'deepseek/deepseek-r1'
  beautification: 'deepseek/deepseek-r1'
  booking: 'openai/o1-mini'

paths:
  cache_dir: 'data/artists/{artist_slug}/cache'
  email_dir: 'data/artists/{artist_slug}/emails'
  data_dir: 'data/artists/{artist_slug}'

error_handling:
  max_retries: 2
  retry_delay: 1.0
  stream_error_keywords: ['stream', 'streaming']
  default_retries: 3
