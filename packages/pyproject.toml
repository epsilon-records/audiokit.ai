[tool.poetry]
name = "audiokit-meta"
version = "0.1.0"
description = "Meta package for AudioKit ecosystem development"
authors = ["Your Name <your.email@example.com>"]

[tool.poetry.dependencies]
python = "^3.11"
audiokit-core = {path = "audiokit-core", develop = true}
