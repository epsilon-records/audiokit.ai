[tool.poetry]
name = "audiokit-meta"
version = "0.1.0"
description = "🎛️ AudioKit Meta: The development hub for the AudioKit ecosystem"
authors = ["Nathaniel Houk <nate@audiokit.ai>"]

[tool.poetry.dependencies]
python = ">=3.10,<3.11"
audiokit-core = {path = "audiokit-core", develop = true}
audiokit = {path = "audiokit", develop = true}
audiokit-ai = {path = "audiokit-ai", develop = true}

[tool.poetry.group.dev.dependencies]
pytest = "^7.4.0"
ipython = "^8.12.0"
mypy = "^1.4.1"

[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"
